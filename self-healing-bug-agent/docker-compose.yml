version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=INFO
      - GITHUB_AUTOFIX_LABEL=agent-fix
      - MAX_REPAIR_ITERATIONS=3
      - WORKSPACE_ROOT=./workspaces
    volumes:
      - ./workspaces:/app/workspaces
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ../ai-repair-dashboard:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped